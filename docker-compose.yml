services:
  db:
    image: postgres:16
    # Build/run for x86-64 even when building on an Apple-silicon Mac.
    platform: linux/amd64
    # Offline host: never reach a registry; use the locally loaded image.
    pull_policy: never
    environment:
      POSTGRES_USER: filebrowser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filebrowser}
      POSTGRES_DB: filebrowser
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filebrowser"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    image: file-browser-web:latest
    platform: linux/amd64
    pull_policy: never
    build:
      context: .
      platforms:
        - linux/amd64
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://filebrowser:${POSTGRES_PASSWORD:-filebrowser}@db:5432/filebrowser
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped

volumes:
  pgdata:
